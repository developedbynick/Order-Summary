<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0"
		/>
		<link
			href="https://api.fontshare.com/v2/css?f[]=chillax@400,500,600,700&display=swap"
			rel="stylesheet"
		/>
		<link
			rel="stylesheet"
			href="style.css"
		/>
		<!-- displays site properly based on user's device -->

		<link
			rel="icon"
			type="image/png"
			sizes="32x32"
			href="./images/favicon-32x32.png"
		/>

		<title>Frontend Mentor | Order summary card</title>

		<!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
		<style>
			.attribution {
				font-size: 11px;
				text-align: center;
			}
			.attribution a {
				color: hsl(228, 45%, 44%);
			}
		</style>
	</head>
	<body>
		<img
			src="./images/pattern-background-desktop.svg"
			alt="top-warp"
			id="top-warp"
		/>
		<img
			src="./images/pattern-background-desktop.svg"
			alt="bottom-warp"
			id="bottom-warp"
		/>
		<div id="order-container">
			<div class="container">
				<div class="visual"></div>
				<div class="text">
					<h1>Order Summary</h1>
					<p>You can now listen to millions of songs, audiobooks, and podcasts on any device anywhere you like!</p>
					<div id="plan-details">
						<div id="first-half">
							<img
								src="./images/icon-music.svg"
								alt="Music"
							/>
							<div id="half-text">
								<h2>Annual Plan</h2>
								<p>$59.99/year</p>
							</div>
						</div>
						<button class="plan-change">Change</button>
					</div>

					<button class="proceed">Proceed to Payment</button>
					<button class="cancel">Cancel Order</button>
				</div>
			</div>
		</div>

		<div class="attribution">
			Challenge by
			<a
				href="https://www.frontendmentor.io?ref=challenge"
				target="_blank"
				>Frontend Mentor</a
			>. Coded by <a href="https://github.com/developedbynick">Nicholas Smith</a>.
		</div>
	</body>
</html>
